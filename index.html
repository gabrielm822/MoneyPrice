<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONEYPRICE | Global Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #030303; color: #ffffff; font-family: 'Inter', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .glass { background: rgba(12, 12, 12, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .purple-glow { box-shadow: 0 0 40px rgba(139, 92, 246, 0.07); }
        #tv-chart { flex-grow: 1; min-height: 0; }
        
        /* Estilo do Autocomplete */
        .suggestions-box {
            position: absolute; top: 110%; left: 0; width: 100%; z-index: 50;
            background: #121212; border: 1px solid #27272a; border-radius: 8px;
            max-height: 200px; overflow-y: auto; display: none;
        }
        .suggestion-item { padding: 10px 15px; font-size: 11px; cursor: pointer; border-bottom: 1px solid #1a1a1a; }
        .suggestion-item:hover { background: #8b5cf6; color: white; }
    </style>
</head>
<body class="p-3">
    <header class="flex justify-between items-center mb-4 px-2">
        <div class="flex items-center gap-3">
            <div class="px-2 py-1 bg-purple-600 text-[10px] font-black rounded uppercase tracking-tighter">Live</div>
            <h1 class="text-xl font-black tracking-tighter uppercase italic text-zinc-200">MoneyPrice</h1>
        </div>
        
        <div class="relative w-80">
            <input type="text" id="asset-search" placeholder="BUSCAR ATIVO (EX: PE...)" 
                class="bg-zinc-900 border border-zinc-800 px-5 py-2 rounded-full text-[11px] focus:outline-none focus:border-purple-500 w-full transition-all text-purple-100"
                oninput="handleAutocomplete()" autocomplete="off">
            <div id="suggestions" class="suggestions-box shadow-2xl"></div>
        </div>
    </header>

    <main class="grid grid-cols-12 gap-4 flex-grow overflow-hidden">
        <aside class="col-span-3 flex flex-col gap-4">
            <div class="glass rounded-2xl p-5 flex-grow overflow-y-auto">
                <h3 class="text-[10px] font-black text-purple-500 mb-6 tracking-[0.3em] uppercase">Tendências</h3>
                <div id="trending-list" class="space-y-4"></div>
            </div>
        </aside>

        <section class="col-span-9 glass rounded-2xl overflow-hidden purple-glow flex flex-col">
            <div class="p-5 border-b border-zinc-900 flex justify-between items-end">
                <div>
                    <span id="display-symbol" class="text-zinc-500 text-[10px] font-bold tracking-widest uppercase italic">Carregando...</span>
                    <div id="main-price" class="text-5xl font-black tracking-tighter">$0.00</div>
                    <div id="main-change" class="text-xs font-bold mt-2 inline-block px-2 py-0.5 rounded">0.00%</div>
                </div>
                <div class="text-right pb-1">
                    <p class="text-[9px] text-zinc-600 font-bold uppercase tracking-widest mb-1">Status</p>
                    <p class="text-[10px] text-emerald-500 font-black">STABLE STREAM</p>
                </div>
            </div>
            <div id="tv-chart">
                <div id="tradingview_widget" class="w-full h-full"></div>
            </div>
        </section>
    </main>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // Lista de sugestões
        const assets = [
            {t: "BTC", n: "Bitcoin", p: "BINANCE:BTCUSDT"},
            {t: "ETH", n: "Ethereum", p: "BINANCE:ETHUSDT"},
            {t: "SOL", n: "Solana", p: "BINANCE:SOLUSDT"},
            {t: "PETR4", n: "Petrobras", p: "BMFBOVESPA:PETR4"},
            {t: "VALE3", n: "Vale S.A.", p: "BMFBOVESPA:VALE3"},
            {t: "MGLU3", n: "Magazine Luiza", p: "BMFBOVESPA:MGLU3"},
            {t: "AAPL", n: "Apple Inc.", p: "NASDAQ:AAPL"},
            {t: "TSLA", n: "Tesla Motors", p: "NASDAQ:TSLA"},
            {t: "DOGE", n: "Dogecoin", p: "BINANCE:DOGEUSDT"}
        ];

        function handleAutocomplete() {
            const val = document.getElementById('asset-search').value.toUpperCase();
            const box = document.getElementById('suggestions');
            box.innerHTML = '';
            
            if (val.length > 0) {
                const matches = assets.filter(a => a.t.includes(val) || a.n.toUpperCase().includes(val));
                if (matches.length > 0) {
                    box.style.display = 'block';
                    matches.forEach(m => {
                        const div = document.createElement('div');
                        div.className = 'suggestion-item';
                        div.innerHTML = `<strong>${m.t}</strong> - ${m.n}`;
                        div.onclick = () => selectAsset(m);
                        box.appendChild(div);
                    });
                } else { box.style.display = 'none'; }
            } else { box.style.display = 'none'; }
        }

        function selectAsset(asset) {
            document.getElementById('asset-search').value = '';
            document.getElementById('suggestions').style.display = 'none';
            loadChart(asset.p, asset.t);
        }

        function loadChart(path, symbol) {
            new TradingView.widget({
                "autosize": true, "symbol": path, "interval": "D",
                "theme": "dark", "style": "1", "locale": "br",
                "container_id": "tradingview_widget", "backgroundColor": "#030303",
                "gridColor": "rgba(255, 255, 255, 0.03)"
            });
            document.getElementById('display-symbol').innerText = symbol + " / MARKET";
        }

        // Esconder sugestões se clicar fora
        document.addEventListener('click', (e) => {
            if (e.target.id !== 'asset-search') document.getElementById('suggestions').style.display = 'none';
        });

        loadChart("BINANCE:BTCUSDT", "BTC");
    </script>
</body>
</html>
