<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONEYPRICE | Global Market Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #ffffff; font-family: 'Inter', sans-serif; overflow: hidden; }
        .glass { background: rgba(18, 18, 18, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .purple-glow { box-shadow: 0 0 20px rgba(139, 92, 246, 0.15); }
        #tv-chart { height: calc(100vh - 180px); }
    </style>
</head>
<body class="p-4">
    <header class="flex justify-between items-center mb-6 px-4">
        <h1 class="text-2xl font-black tracking-tighter uppercase italic">MoneyPrice</h1>
        <div class="flex gap-4">
            <input type="text" placeholder="PESQUISAR ATIVO..." class="bg-zinc-900 border border-zinc-800 px-4 py-2 rounded-md text-xs focus:outline-none focus:border-purple-500 w-64">
        </div>
    </header>

    <main class="grid grid-cols-12 gap-4">
        <section class="col-span-9 glass rounded-xl overflow-hidden purple-glow">
            <div class="p-4 border-b border-zinc-800 flex justify-between items-center bg-zinc-900/50">
                <div>
                    <span class="text-purple-400 text-xs font-bold tracking-widest uppercase">Bitcoin / USD</span>
                    <div id="btc-price" class="text-4xl font-black">$0.00</div>
                    <span id="btc-change" class="text-sm font-medium text-zinc-500">0.00%</span>
                </div>
                <button class="bg-purple-600 hover:bg-purple-700 text-white px-6 py-2 rounded-lg font-bold text-xs transition-all uppercase tracking-widest">Negociar Agora</button>
            </div>
            <div id="tv-chart">
                <div class="tradingview-widget-container" style="height:100%;width:100%">
                    <div id="tradingview_main" style="height:calc(100%);width:100%"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
                    <script type="text/javascript">
                        new TradingView.widget({
                            "autosize": true,
                            "symbol": "BINANCE:BTCUSDT",
                            "interval": "D",
                            "timezone": "Etc/UTC",
                            "theme": "dark",
                            "style": "1",
                            "locale": "br",
                            "toolbar_bg": "#f1f3f6",
                            "enable_publishing": false,
                            "hide_top_toolbar": false,
                            "save_image": false,
                            "container_id": "tradingview_main",
                            "backgroundColor": "rgba(5, 5, 5, 1)",
                            "gridColor": "rgba(255, 255, 255, 0.06)"
                        });
                    </script>
                </div>
            </div>
        </section>

        <aside class="col-span-3 space-y-4">
            <div class="glass rounded-xl p-4 h-full">
                <h3 class="text-xs font-bold text-zinc-500 mb-4 tracking-widest uppercase">Real-Time Market</h3>
                <div id="market-list" class="space-y-4 text-sm font-medium">
                    <div class="flex justify-between border-b border-zinc-800 pb-2">
                        <span class="text-zinc-400">ETH</span>
                        <span id="price-eth" class="text-white">Carregando...</span>
                    </div>
                    <div class="flex justify-between border-b border-zinc-800 pb-2">
                        <span class="text-zinc-400">SOL</span>
                        <span id="price-sol" class="text-white">Carregando...</span>
                    </div>
                </div>
            </div>
        </aside>
    </main>

    <footer class="mt-4 text-[10px] text-zinc-600 text-center uppercase tracking-[0.2em]">
        MoneyPrice Terminal v2.0 • Built by Gabriel • Powered by CoinGecko & TradingView • 2026
    </footer>

    <script>
        async function fetchPrices() {
            try {
                const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana&vs_currencies=usd&include_24hr_change=true');
                const data = await res.json();
                
                document.getElementById('btc-price').innerText = `$${data.bitcoin.usd.toLocaleString()}`;
                const btcChange = data.bitcoin.usd_24h_change;
                document.getElementById('btc-change').innerText = `${btcChange.toFixed(2)}%`;
                document.getElementById('btc-change').style.color = btcChange >= 0 ? '#10b981' : '#ef4444';
                
                document.getElementById('price-eth').innerText = `$${data.ethereum.usd.toLocaleString()}`;
                document.getElementById('price-sol').innerText = `$${data.solana.usd.toLocaleString()}`;
            } catch (e) { console.log("Erro ao carregar preços"); }
        }
        setInterval(fetchPrices, 10000);
        fetchPrices();
    </script>
</body>
</html>
