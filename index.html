<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONEYPRICE | Global Market Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root { --bg: #050505; --card: #0d0d0d; --accent: #9945FF; --green: #14F195; --red: #ff3e3e; --white: #eee; --gray: #444; }
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        body { background: var(--bg); color: var(--gray); font-family: 'JetBrains Mono', monospace; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
        
        /* Header Profissional */
        header { width: 100%; max-width: 1200px; display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid #1a1a1a; margin-bottom: 20px; }
        h1 { color: var(--white); font-size: 1.2rem; letter-spacing: 5px; }
        .search-container { position: relative; }
        .search-bar { background: #111; border: 1px solid #222; color: white; padding: 10px 15px; border-radius: 6px; font-family: inherit; width: 300px; transition: 0.3s; }
        .search-bar:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(153, 69, 255, 0.2); }

        /* Grid Layout */
        .main-grid { width: 100%; max-width: 1200px; display: grid; grid-template-columns: 1fr 380px; gap: 20px; }
        
        /* Área do Gráfico */
        #chart { background: var(--card); border: 1px solid #1a1a1a; height: 550px; border-radius: 12px; position: relative; overflow: hidden; }
        .info-panel { position: absolute; top: 25px; left: 25px; z-index: 10; pointer-events: none; }
        .price-val { font-size: 2.8rem; color: var(--white); font-weight: bold; margin: 5px 0; }
        
        /* Botão de Lucro */
        .btn-trade { display: inline-block; margin-top: 15px; background: var(--accent); color: white; padding: 12px 30px; border-radius: 8px; text-decoration: none; font-weight: bold; transition: 0.3s; pointer-events: auto; }
        .btn-trade:hover { background: #7a2fd1; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(153, 69, 255, 0.4); }

        /* Watchlist */
        .sidebar { background: var(--card); border: 1px solid #1a1a1a; border-radius: 12px; padding: 20px; height: 550px; overflow-y: auto; }
        .coin-row { display: flex; justify-content: space-between; padding: 15px 12px; border-bottom: 1px solid #111; cursor: pointer; border-radius: 8px; transition: 0.2s; margin-bottom: 5px; }
        .coin-row:hover { background: #151515; }
        .up { color: var(--green); } .down { color: var(--red); }
        
        .footer { grid-column: span 2; text-align: center; font-size: 0.65rem; margin-top: 50px; color: #222; border-top: 1px solid #111; padding-top: 20px; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
    </style>
</head>
<body>

    <header>
        <h1>MONEYPRICE</h1>
        <div class="search-container">
            <input type="text" class="search-bar" placeholder="PESQUISAR ATIVO...">
        </div>
    </header>

    <div class="main-grid">
        <div id="chart">
            <div class="info-panel">
                <h2 id="active-name" style="color: var(--accent); font-size: 0.8rem; letter-spacing: 2px;">BITCOIN / USD</h2>
                <div id="active-price" class="price-val">$0.00</div>
                <div id="active-change" style="font-size: 0.9rem;">0.00%</div>
                <a href="SEU_LINK_DE_AFILIADO_AQUI" target="_blank" class="btn-trade">NEGOCIAR AGORA</a>
            </div>
        </div>

        <div class="sidebar">
            <p style="font-size: 0.6rem; color: #333; margin-bottom: 20px; letter-spacing: 3px;">REAL_TIME_MARKET</p>
            <div id="market-list">
                </div>
        </div>

        <footer class="footer">
            MONEYPRICE TERMINAL v2.0 • BUILT BY GABRIEL • POWERED BY COINGECKO & TRADINGVIEW • 2026
        </footer>
    </div>

    <script>
        // Configuração do Gráfico
        const chart = LightweightCharts.createChart(document.getElementById('chart'), {
            layout: { backgroundColor: '#0d0d0d', textColor: '#555' },
            grid: { vertLines: { color: '#111' }, horzLines: { color: '#111' } },
            timeScale: { borderColor: '#222' },
            priceScale: { borderColor: '#222' }
        });
        const series = chart.addAreaSeries({ 
            lineColor: '#9945FF', 
            topColor: 'rgba(153, 69, 255, 0.4)', 
            bottomColor: 'rgba(153, 69, 255, 0.0)',
            lineWidth: 3 
        });

        // Função de Atualização
        async function fetchMarket() {
            try {
                const response = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=15&page=1');
                const coins = await response.json();
                const container = document.getElementById('market-list');
                container.innerHTML = '';

                coins.forEach((coin, i) => {
                    if (i === 0 && document.getElementById('active-price').innerText === '$0.00') selectCoin(coin);
                    
                    const row = document.createElement('div');
                    row.className = 'coin-row';
                    row.onclick = () => selectCoin(coin);
                    row.innerHTML = `
                        <div><b style="color:#eee">${coin.symbol.toUpperCase()}</b><br><small style="font-size:0.6rem">${coin.name}</small></div>
                        <div style="text-align:right">
                            <div style="color:#eee; font-size:0.9rem">$${coin.current_price.toLocaleString()}</div>
                            <div class="${coin.price_change_percentage_24h >= 0 ? 'up' : 'down'}" style="font-size:0.7rem">
                                ${coin.price_change_percentage_24h.toFixed(2)}%
                            </div>
                        </div>`;
                    container.appendChild(row);
                });
            } catch (err) { console.error("Falha na API."); }
        }

        function selectCoin(c) {
            document.getElementById('active-name').innerText = `${c.name.toUpperCase()} / USD`;
            document.getElementById('active-price').innerText = `$${c.current_price.toLocaleString()}`;
            document.getElementById('active-change').innerText = `${c.price_change_percentage_24h.toFixed(2)}%`;
            document.getElementById('active-change').className = c.price_change_percentage_24h >= 0 ? 'up' : 'down';
            
            // Simulação de Histórico (Mock)
            const data = Array.from({length:50}, (_, i) => ({
                time: (Date.now()/1000) - (50-i)*86400,
                value: c.current_price * (0.97 + Math.random() * 0.06)
            }));
            series.setData(data);
            chart.timeScale().fitContent();
        }

        fetchMarket();
        setInterval(fetchMarket, 60000);
    </script>
</body>
</html>
